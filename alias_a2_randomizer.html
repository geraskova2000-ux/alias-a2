<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alias A2</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #dff7ff 0, transparent 32%),
        radial-gradient(circle at bottom left, #cfeeff 0, transparent 35%),
        linear-gradient(135deg, #effaff, #d9f1ff);
      color: #295267;
      overflow: hidden;
    }

    .title {
      position: fixed;
      top: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #35708e;
      text-shadow: 0 6px 20px rgba(100, 170, 200, 0.22);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(170px, 260px) 1fr;
      align-items: center;
      padding: 90px 7vw 50px 6vw;
      gap: 24px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: flex-start;
    }

    button {
      border: 0;
      cursor: pointer;
      padding: 16px 22px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      color: #2f6f8f;
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        0 14px 30px rgba(80, 150, 180, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.88);
      box-shadow:
        0 18px 34px rgba(80, 150, 180, 0.27),
        inset 0 0 0 1px rgba(255, 255, 255, 0.95);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .word-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 45vh;
    }

    .word-card {
      width: min(760px, 90%);
      min-height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 42px;
      border-radius: 42px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow:
        0 28px 70px rgba(80, 155, 190, 0.20),
        inset 0 0 0 1px rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
    }

    #word {
      font-size: clamp(44px, 8vw, 96px);
      line-height: 1.05;
      font-weight: 800;
      color: #245d79;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    #word.show {
      opacity: 1;
      transform: translateY(0);
    }

    .bubble {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.34);
      filter: blur(1px);
      pointer-events: none;
    }

    .b1 { width: 180px; height: 180px; right: 9%; top: 20%; }
    .b2 { width: 110px; height: 110px; left: 12%; bottom: 12%; }
    .b3 { width: 72px; height: 72px; right: 25%; bottom: 16%; }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 110px 22px 34px;
      }

      .controls {
        align-items: center;
      }

      .word-card {
        width: 100%;
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>

  <header class="title">Alias A2</header>

  <main class="layout">
    <section class="controls">
      <button onclick="giveWord()">give me a word</button>
    </section>

    <section class="word-wrap">
      <div class="word-card">
        <div id="word">ready?</div>
      </div>
    </section>
  </main>

  <script>
    const words = [
      "leather",
      "high heels",
      "advantage",
      "take a break",
      "burnout",
      "a mess",
      "a remote",
      "fries",
      "opinion",
      "host",
      "adventure",
      "a trip",
      "crowd",
      "view",
      "a disaster",
      "mustache",
      "beard",
      "weather",
      "hobby",
      "friend",
      "family",
      "neighbor",
      "colleague",
      "customer",
      "manager",
      "office",
      "company",
      "project",
      "meeting",
      "holiday",
      "hotel",
      "ticket",
      "airport",
      "suitcase",
      "passport",
      "beach",
      "mountain",
      "forest",
      "village",
      "city",
      "traffic",
      "accident",
      "problem",
      "mistake",
      "solution",
      "experience",
      "memory",
      "dream",
      "chance",
      "idea",
      "reason",
      "result",
      "habit",
      "lifestyle",
      "health",
      "stress",
      "exercise",
      "diet",
      "break",
      "phone",
      "battery",
      "screen",
      "website",
      "message",
      "photo",
      "video",
      "noise",
      "silence",
      "trip",
      "disaster",
      "journey",
      "queue",
      "package"
    ];

    let remaining = [...words];
    let recent = [];
    const recentLimit = Math.min(10, Math.floor(words.length / 4));

    function giveWord() {
      const wordEl = document.getElementById("word");

      if (remaining.length === 0) {
        remaining = words.filter(word => !recent.includes(word));
        if (remaining.length === 0) remaining = [...words];
      }

      let index = Math.floor(Math.random() * remaining.length);
      let word = remaining.splice(index, 1)[0];

      recent.push(word);
      if (recent.length > recentLimit) recent.shift();

      wordEl.classList.remove("show");

      setTimeout(() => {
        wordEl.textContent = word;
        wordEl.classList.add("show");
      }, 120);
    }

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        event.preventDefault();
        giveWord();
      }
    });

    window.onload = () => {
      document.getElementById("word").classList.add("show");
    };
  </script>
</body>
</html>
